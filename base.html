<!DOCTYPE html>
<html>
<head>
    <title>Student Analytics Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            transition: 0.4s;
        }

        body.dark-mode {
            background: #121212;
            color: white;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.3) !important;
            padding: 15px;
        }

        .navbar-title {
            font-size: 22px;
            font-weight: bold;
        }

        .btn-custom {
            background-color: white;
            color: #764ba2;
            font-weight: bold;
            border-radius: 10px;
            padding: 8px 16px;
            margin-left: 5px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #f1f1f1;
            transform: translateY(-2px);
        }

        body.dark-mode .btn-custom {
            background-color: #333;
            color: white;
        }

        .card {
            border-radius: 15px;
            color: black;
        }

        table {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="navbar-title">📊 Student Analytics Dashboard</div>

    {% if session.get("user") %}
    <div>
        <a class="btn btn-custom" href="/dashboard">Home</a>
        <a class="btn btn-custom" href="/students">Students</a>
        <a class="btn btn-custom" href="/performance">Performance</a>
        <a class="btn btn-custom" href="/logout">Logout</a>
        <button class="btn btn-custom" onclick="toggleDarkMode()">🌙</button>
    </div>
    {% endif %}
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
