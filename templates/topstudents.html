<!DOCTYPE html>
<html>
<head>

<title>Top Students</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial;
color:white;
}

table{
background:white;
color:black;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Top 5 Students</h2>

<table class="table table-bordered">

<thead class="thead-dark">
<tr>
<th>Name</th>
<th>Total</th>
<th>Performance</th>
</tr>
</thead>

<tbody>

{% for s in students %}

<tr>
<td>{{s.Name}}</td>
<td>{{s.Total}}</td>
<td>{{s.Performance}}</td>
</tr>

{% endfor %}

</tbody>

</table>

<div class="text-center">
<a href="/admin" class="btn btn-light">Back</a>
</div>

</div>

</body>
</html>
