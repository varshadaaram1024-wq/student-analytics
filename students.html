<!DOCTYPE html>
<html>
<head>

<title>Students List</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
color:white;
font-family:Arial;
}

table{
background:white;
color:black;
}

h2{
font-weight:bold;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">All Students List</h2>

<table class="table table-bordered table-striped">

<thead class="thead-dark">

<tr>

<th>Name</th>
<th>Math</th>
<th>Programming</th>
<th>Communication</th>
<th>Total</th>
<th>Performance</th>

</tr>

</thead>

<tbody>

{% for s in students %}

<tr>

<td>{{ s.Name }}</td>
<td>{{ s.Math }}</td>
<td>{{ s.Programming }}</td>
<td>{{ s.Communication }}</td>
<td>{{ s.Total }}</td>
<td>{{ s.Performance }}</td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="text-center mt-3">

<a href="/admin" class="btn btn-light">
Back to Dashboard
</a>

</div>

</div>

</body>
</html>
