<!DOCTYPE html>
<html>
<head>

<title>Student Performance Prediction</title>

<style>

body{
font-family:Arial;
background:#f2f6ff;
text-align:center;
padding:50px;
}

.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.result{
margin-top:20px;
font-size:20px;
color:#333;
}

</style>

</head>

<body>

<div class="box">

<h2>Student Performance Prediction</h2>

<form method="POST">

<input type="number" name="marks" placeholder="Enter Marks" required>

<br>

<button type="submit">Predict Performance</button>

</form>

{% if result %}

<div class="result">

Predicted Performance: <b>{{result}}</b>

</div>

{% endif %}

</div>

</body>
</html>
